version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: qris-postgres
    environment:
      POSTGRES_USER: qris
      POSTGRES_PASSWORD: qris
      POSTGRES_DB: qris_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: qris-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    container_name: qris-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: